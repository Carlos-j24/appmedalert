<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedAlert - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>MedAlert</h1>
    <div class="info">
      <div id="fecha-hora"></div>
      <div>👤 Rol: Selección</div>
    </div>
    <button onclick="toggleDarkMode()">🌙 Modo Oscuro</button>
  </header>

  <div class="container">
    <form id="loginForm">
      <h2>🔐 Ingreso a MedAlert</h2>

      <label for="username">Usuario:</label>
      <input type="text" id="username" required>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" required>

      <label for="role">Selecciona tu rol:</label>
      <select id="role" required>
        <option value="">Seleccione</option>
        <option value="paciente">Paciente</option>
        <option value="cuidador">Cuidador</option>
      </select>

      <button type="submit" id="login-btn">Ingresar</button>

      <p id="error-msg" style="color:red; display:none;">
        ❌ Usuario o contraseña incorrectos
      </p>
    </form>
  </div>

  <!-- IMPORTANTE -->
  <script src="script.js"></script>

</body>
</html>
